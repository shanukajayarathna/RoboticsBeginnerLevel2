[build]
  publish = "."

# Make sure kids always get the latest question bank instead of a
# stale cached copy after you redeploy with edited questions.
[[headers]]
  for = "/data/questions.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
